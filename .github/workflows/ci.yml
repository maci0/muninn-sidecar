name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Format
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.5.1
          staticcheck ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/msc/
