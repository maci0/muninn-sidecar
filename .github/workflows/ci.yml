name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # Latest 1.25.x patch (not the vulnerable 1.25.0 the go.mod directive
          # would pin): picks up stdlib security backports so govulncheck is clean,
          # while staying on the 1.25 line that the pinned staticcheck supports.
          go-version: "1.25"
          cache: false # no third-party deps / no go.sum to cache

      - name: Tidy
        # Verify `go mod tidy` is a no-op. Uses `git status --porcelain` rather
        # than `git diff go.mod go.sum` because this module has no dependencies and
        # thus no go.sum — `git diff` errors on the missing path, while status
        # handles an absent file and still catches a newly-created (untracked) one.
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "::error::go mod tidy changed go.mod/go.sum — commit the result"
            git status --porcelain go.mod go.sum
            git diff go.mod
            exit 1
          fi

      - name: Format
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          # @latest: the pinned v0.5.1 no longer compiles against current Go
          # toolchains (stale x/tools). A linter tracking the toolchain is the
          # right call here over a pin that breaks the build.
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./...   # all binaries: msc, msc-bench, msc-qa, msc-eval

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # Latest 1.25.x patch (not the vulnerable 1.25.0 the go.mod directive
          # would pin): picks up stdlib security backports so govulncheck is clean,
          # while staying on the 1.25 line that the pinned staticcheck supports.
          go-version: "1.25"
          cache: false # no third-party deps / no go.sum to cache

      # Run a short campaign over every fuzz target. The seed corpora (including
      # past crashers) run under `go test` above; this also explores new inputs
      # briefly, so regressions surface on every push, not just on a manual run.
      - name: Fuzz (short campaign, all targets)
        run: FUZZTIME=8s make fuzz

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # Latest 1.25.x patch (not the vulnerable 1.25.0 the go.mod directive
          # would pin): picks up stdlib security backports so govulncheck is clean,
          # while staying on the 1.25 line that the pinned staticcheck supports.
          go-version: "1.25"
          cache: false # no third-party deps / no go.sum to cache

      # Scan reachable code against the Go vulnerability DB. The module has no
      # third-party dependencies, so this primarily catches stdlib CVEs tied to
      # the toolchain version — and guards future dependencies.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
